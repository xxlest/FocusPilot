name: FocusPilot
options:
  bundleIdPrefix: com.focuscopilot
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_OBJC_BRIDGING_HEADER: "FocusPilot/Helpers/FocusPilot-Bridging-Header.h"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_ENTITLEMENTS: "FocusPilot/Resources/FocusPilot.entitlements"

targets:
  FocusPilot:
    type: application
    platform: macOS
    sources:
      - path: FocusPilot
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.focuscopilot.FocusCopilot
        INFOPLIST_FILE: FocusPilot/Resources/Info.plist
        PRODUCT_NAME: FocusCopilot
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
    info:
      path: FocusPilot/Resources/Info.plist
