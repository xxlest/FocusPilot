<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FocusPilot Warm Ivory Red Logo Options</title>
  <style>
    :root {
      color-scheme: light;
      --page: #f7f2eb;
      --ink: #2e2924;
      --muted: #7a7066;
      --line: #e0d9cc;
      --surface: #fbf8f4;
      --side: #f4f0ea;
      --accent: #d97706;
      --font: Avenir Next, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page);
      color: var(--ink);
      font-family: var(--font);
    }

    .page {
      max-width: 1240px;
      margin: 0 auto;
      padding: 28px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      letter-spacing: 0;
    }

    .sub,
    .note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .note {
      max-width: 430px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.58);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 14px;
    }

    .option {
      background: rgba(255,255,255,.74);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      min-width: 0;
      box-shadow: 0 10px 30px rgba(73,50,23,.06);
    }

    .option.recommended {
      border-color: color-mix(in srgb, var(--mid) 42%, var(--line));
      box-shadow: 0 14px 36px color-mix(in srgb, var(--mid) 12%, transparent);
    }

    .option-head {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      min-height: 122px;
    }

    .title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 7px;
      font-size: 14px;
      font-weight: 750;
    }

    .badge {
      font-size: 10px;
      color: var(--mid);
      background: color-mix(in srgb, var(--mid) 9%, transparent);
      border: 1px solid color-mix(in srgb, var(--mid) 24%, transparent);
      border-radius: 999px;
      padding: 2px 7px;
      white-space: nowrap;
    }

    .desc {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .mock {
      display: grid;
      grid-template-columns: 46px 1fr;
      min-height: 162px;
      background: var(--surface);
    }

    .rail {
      background: var(--side);
      border-right: 1px solid rgba(224,217,204,.78);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 13px;
      gap: 10px;
    }

    .nav-dot {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: color-mix(in srgb, var(--mid) 8%, transparent);
      border: 1px solid color-mix(in srgb, var(--mid) 10%, transparent);
    }

    .panel {
      padding: 14px;
      display: grid;
      align-content: start;
      gap: 10px;
    }

    .row {
      height: 10px;
      border-radius: 999px;
      background: rgba(46,41,36,.14);
    }

    .row.one { width: 78%; }
    .row.two { width: 54%; }
    .row.three { width: 68%; margin-top: 12px; }

    .pill {
      width: 72px;
      height: 22px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--mid) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--mid) 22%, transparent);
      color: var(--mid);
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
    }

    .sizes {
      padding: 12px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,.50);
    }

    .size-set { display: flex; align-items: center; gap: 10px; }
    .tiny-label { color: var(--muted); font-size: 10px; font-family: var(--mono); }

    .logo {
      display: block;
      border-radius: 50%;
      filter: drop-shadow(0 5px 14px color-mix(in srgb, var(--mid) 15%, transparent));
    }
    .logo.lg { width: 32px; height: 32px; }
    .logo.md { width: 28px; height: 28px; }
    .logo.sm { width: 20px; height: 20px; }
    .logo.xs { width: 16px; height: 16px; }

    .tokens {
      padding: 10px 12px 13px;
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      line-height: 1.35;
    }

    .swatches { display: flex; gap: 6px; align-items: center; }
    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid rgba(46,41,36,.12);
    }

    @media (max-width: 1180px) {
      .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .header { flex-direction: column; }
      .note { max-width: none; }
    }

    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <div>
        <h1>暖象牙 Logo：浅红候选</h1>
        <div class="sub">基于 F 原生重绘形状，只测试暖象牙主题下的浅红/朱砂/陶土红方向。主原型暂不改。</div>
      </div>
      <div class="note">浅红方向的好处是更有品牌记忆点，像「暖纸上的朱砂印」。风险是过红会和默认白主题接近，所以这里都压低饱和度、增加暖灰底色。</div>
    </header>

    <section class="grid" id="grid"></section>
  </main>

  <script>
    const options = [
      {
        id: 'A',
        name: '当前亮琥珀',
        desc: '现有暖象牙版本，用作对照。明亮、协调，但品牌记忆点偏橙。',
        light: '#FFD27A',
        mid: '#E8951F',
        dark: '#925611'
      },
      {
        id: 'R1',
        name: '浅朱红',
        desc: '最接近“暖象牙 + 朱砂印”的方向，红感明确但不艳。',
        light: '#FFB5A8',
        mid: '#D65A4A',
        dark: '#7E2D27',
        recommended: true
      },
      {
        id: 'R2',
        name: '陶土红',
        desc: '红里带一点土色，和暖象牙最贴合，成熟耐看。',
        light: '#F3B39B',
        mid: '#C96B4F',
        dark: '#71402F',
        recommended: true
      },
      {
        id: 'R3',
        name: '珊瑚红',
        desc: '更轻、更亮，亲和力强；如果想年轻一点可以看这版。',
        light: '#FFC0AE',
        mid: '#E26B56',
        dark: '#874037'
      },
      {
        id: 'R4',
        name: '玫瑰棕红',
        desc: '最克制，偏高级灰红，适合长时间看但亮度提升较少。',
        light: '#E8AFA8',
        mid: '#B85C57',
        dark: '#633737'
      },
      {
        id: 'R5',
        name: '胭脂红',
        desc: '红色识别最强，品牌感明确；如果觉得太跳，可以回退 R1。',
        light: '#FFAAA0',
        mid: '#D94B43',
        dark: '#7A2524'
      }
    ];

    function logo(option, sizeClass) {
      return `
        <svg class="logo ${sizeClass}" style="--mid:${option.mid}" viewBox="0 0 64 64" role="img" aria-label="FocusPilot ${option.name}">
          <defs>
            <radialGradient id="g-${option.id}" cx="34%" cy="26%" r="72%">
              <stop offset="0%" stop-color="${option.light}" />
              <stop offset="54%" stop-color="${option.mid}" />
              <stop offset="100%" stop-color="${option.dark}" />
            </radialGradient>
            <linearGradient id="h-${option.id}" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#fff" stop-opacity=".54" />
              <stop offset="54%" stop-color="#fff" stop-opacity=".10" />
              <stop offset="100%" stop-color="#fff" stop-opacity="0" />
            </linearGradient>
          </defs>
          <circle cx="32" cy="32" r="31" fill="url(#g-${option.id})" />
          <ellipse cx="22" cy="16" rx="18" ry="11" fill="url(#h-${option.id})" transform="rotate(-28 22 16)" />
          <circle cx="32" cy="32" r="30.25" fill="none" stroke="#fff" stroke-opacity=".18" stroke-width="1" />
          <g transform="translate(0 -2)">
            <path d="M20.3 23.4 C25.2 16.8 33.7 14.6 41.8 17.2" fill="none" stroke="#fff" stroke-width="8.0" stroke-linecap="round" stroke-opacity=".94" />
            <path d="M39.4 17.2 C48.5 19.8 53.3 27.6 52.8 36.0" fill="none" stroke="#fff" stroke-width="6.6" stroke-linecap="round" stroke-opacity=".92" />
            <path d="M52.4 35.0 C52.2 39.6 50.5 43.7 47.9 46.8" fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-opacity=".88" />
            <path d="M19.2 37.9 C20.0 46.8 28.1 52.1 38.1 51.3" fill="none" stroke="#fff" stroke-width="2.25" stroke-linecap="round" stroke-opacity=".80" />
            <path d="M20.0 40.4 C24.4 48.6 36.0 52.5 47.4 48.5" fill="none" stroke="#fff" stroke-width="1.08" stroke-linecap="round" stroke-opacity=".70" />
            <path d="M18.7 42.4 C23.8 50.7 35.8 54.4 46.7 50.8" fill="none" stroke="#fff" stroke-width=".62" stroke-linecap="round" stroke-opacity=".52" />
            <circle cx="45.2" cy="48.0" r="1.85" fill="#fff" fill-opacity=".82" />
            <circle cx="41.8" cy="50.4" r="1.34" fill="#fff" fill-opacity=".64" />
            <circle cx="38.4" cy="51.7" r=".88" fill="#fff" fill-opacity=".46" />
          </g>
        </svg>
      `;
    }

    const grid = document.getElementById('grid');
    options.forEach((option) => {
      const card = document.createElement('article');
      card.className = `option ${option.recommended ? 'recommended' : ''}`;
      card.style.setProperty('--mid', option.mid);
      card.innerHTML = `
        <div class="option-head">
          <div class="title">
            <span>${option.id}. ${option.name}</span>
            ${option.recommended ? '<span class="badge">推荐</span>' : ''}
          </div>
          <div class="desc">${option.desc}</div>
        </div>
        <div class="mock">
          <div class="rail">
            ${logo(option, 'lg')}
            <div class="nav-dot"></div>
            <div class="nav-dot" style="opacity:.62"></div>
          </div>
          <div class="panel">
            <div class="row one"></div>
            <div class="row two"></div>
            <div class="pill">暖象牙</div>
            <div class="row three"></div>
          </div>
        </div>
        <div class="sizes">
          <div class="size-set">
            ${logo(option, 'md')}
            ${logo(option, 'sm')}
            ${logo(option, 'xs')}
          </div>
          <span class="tiny-label">28 / 20 / 16</span>
        </div>
        <div class="tokens">
          <div class="swatches">
            <span class="swatch" style="background:${option.light}"></span>
            <span class="swatch" style="background:${option.mid}"></span>
            <span class="swatch" style="background:${option.dark}"></span>
          </div>
          <div>light ${option.light}</div>
          <div>mid ${option.mid}</div>
          <div>dark ${option.dark}</div>
        </div>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
